name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Installer Java
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Compiler le backend
      - name: Build Spring Boot app
        run: |
          cd springboot/app
          mvn clean package -DskipTests

      # Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build backend image
      - name: Build backend image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app -f springboot/app/Dockerfile ./springboot/app

      # Build frontend image
      - name: Build frontend image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app ./angular-app

      # Push backend
      - name: Push backend image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app

      # Push frontend
      - name: Push frontend image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app
