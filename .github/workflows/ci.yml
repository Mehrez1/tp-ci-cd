name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/backend ./backend

      - name: Push backend
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend

      - name: Build frontend
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend ./frontend

      - name: Push frontend
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend
