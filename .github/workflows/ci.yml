name: "CI Pipeline"

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout du code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3️⃣ Build backend image
      - name: Build backend image
        run: |
          docker build --pull -t ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app ./backend

      # 4️⃣ Build frontend image
      - name: Build frontend image
        run: |
          docker build --pull -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app ./frontend

      # 5️⃣ Push backend image
      - name: Push backend image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app

      # 6️⃣ Push frontend image
      - name: Push frontend image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app

